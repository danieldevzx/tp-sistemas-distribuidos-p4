services:
  nameserver:
    image: python:3.10-slim
    command: >
      bash -c "pip install --no-cache-dir Pyro5 &&
               python -m Pyro5.nameserver --host 0.0.0.0 --port ${NS_PORT:-9090}"
    ports:
      - "${NS_PORT:-9090}:9090"

  server:
    init: true
    build: ./server
    volumes:
      - ./server:/app:z
      - ./data:/app/data:z
    command: watchmedo auto-restart --recursive --pattern="*.py" --directory="." python main.py
    environment:
      - DB_PATH=/app/data/sistema.db
      - NS_HOST=${NS_HOST:-nameserver}
      - NS_PORT=${NS_PORT:-9090}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=${SERVER_PORT:-9091}
      - SERVER_NATHOST=${SERVER_NATHOST:-}
      - HOST_IP=${HOST_IP:-}
      - PYTHONUNBUFFERED=1
    ports:
      - "${SERVER_PORT:-9091}:9091"
    depends_on:
      - nameserver
      - db-init

  db-init:
    image: busybox
    volumes:
      - ./data:/app/data:z
    command: ["sh", "-c", "touch /app/data/sistema.db && chmod 666 /app/data/sistema.db"]

  client:
    init: true
    build: ./client
    security_opt:
      - label:disable
    environment:
      - NS_HOST=${NS_HOST:-nameserver}
      - NS_PORT=${NS_PORT:-9090}
      - CALLBACK_HOST=0.0.0.0
      - CALLBACK_PORT=${CALLBACK_PORT:-9092}
      - CALLBACK_NATHOST=${CALLBACK_NATHOST:-client}
      - PYTHONUNBUFFERED=1
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-0}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/run/user/1000}
      - QT_QPA_PLATFORM=wayland;xcb
      - QT_X11_NO_MITSHM=1
    ports:
      - "${CALLBACK_PORT:-9092}:${CALLBACK_PORT:-9092}"
    volumes:
      - ./client:/app:z
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/${WAYLAND_DISPLAY:-wayland-0}:${XDG_RUNTIME_DIR:-/run/user/1000}/${WAYLAND_DISPLAY:-wayland-0}:rw
    command: watchmedo auto-restart --recursive --pattern="*.py" --directory="." python main.py
    depends_on:
      - server
