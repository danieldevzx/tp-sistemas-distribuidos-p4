version: '3.8'

services:
  server:
    init: true
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - ./data:/app/data
    command: watchmedo auto-restart --recursive --pattern="*.py" --directory="." python main.py
    environment:
      - DB_PATH=/app/data/sistema.db
    depends_on:
      - db-init

  db-init:
    image: busybox
    volumes:
      - ./data:/app/data
    command: ["sh", "-c", "touch /app/data/sistema.db && chmod 666 /app/data/sistema.db"]

  client:
    init: true
    build: ./client
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=5000
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=/run/user/1000
      - QT_QPA_PLATFORM=wayland 

    volumes:
      - ./client:/app

      - ${XDG_RUNTIME_DIR}/$WAYLAND_DISPLAY:/run/user/1000/$WAYLAND_DISPLAY
    command: watchmedo auto-restart --recursive --pattern="*.py" --directory="." python main.py
    depends_on:
      - server


